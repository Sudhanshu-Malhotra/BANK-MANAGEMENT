global:
  scrape_interval: 10s
  evaluation_interval: 10s

scrape_configs:
  - job_name: 'spring-actuator'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: 
        - 'api-gateway:8080'
        - 'user-service:8081'
        - 'account-service:8082'
        - 'transaction-service:8083'
